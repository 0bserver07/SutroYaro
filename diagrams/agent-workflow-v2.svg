<svg xmlns="http://www.w3.org/2000/svg" width="840" height="870" viewBox="0 0 840 870" font-family="Helvetica, Arial, sans-serif">
  <rect width="840" height="870" fill="white"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6482b9"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#82b366"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e65100"/>
    </marker>
  </defs>

  <!-- ===== ROW 0: Human ===== -->
  <rect x="330" y="15" width="180" height="45" rx="10" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="420" y="43" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Human (You)</text>

  <!-- Arrow: Human -> Repo -->
  <line x1="420" y1="60" x2="420" y2="97" stroke="#6482b9" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="520" y="83" font-size="11" fill="#446299">writes specs + initial facts</text>

  <!-- ===== ROW 1: GitHub Repo ===== -->
  <rect x="30" y="100" width="780" height="205" rx="12" fill="#f0f4ff" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="230" y="120" font-size="13" font-weight="bold" fill="#4472c4">GitHub Repo (SutroYaro)</text>

  <rect x="50" y="135" width="160" height="60" rx="8" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="130" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">CLAUDE.md</text>
  <text x="130" y="170" text-anchor="middle" font-size="10" fill="#555">problem context</text>
  <text x="130" y="183" text-anchor="middle" font-size="10" fill="#555">constraints, config</text>

  <rect x="230" y="135" width="175" height="60" rx="8" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="317" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">DISCOVERIES.md</text>
  <text x="317" y="170" text-anchor="middle" font-size="10" fill="#555">proven facts</text>
  <text x="317" y="183" text-anchor="middle" font-size="10" fill="#555">known-bad configs</text>

  <rect x="50" y="215" width="160" height="60" rx="8" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="130" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">LAB.md</text>
  <text x="130" y="250" text-anchor="middle" font-size="10" fill="#555">experiment protocol</text>
  <text x="130" y="263" text-anchor="middle" font-size="10" fill="#555">templates</text>

  <rect x="230" y="215" width="175" height="60" rx="8" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="317" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">proposed-approaches.md</text>
  <text x="317" y="253" text-anchor="middle" font-size="10" fill="#555">27 candidate methods</text>

  <!-- Automation Scripts -->
  <rect x="470" y="128" width="320" height="165" rx="8" fill="#f5f5f5" stroke="#999"/>
  <text x="630" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#666">Automation Scripts</text>

  <rect x="490" y="163" width="280" height="28" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="630" y="182" text-anchor="middle" font-size="10" fill="#333">sync_telegram.ts (pull Telegram messages)</text>

  <rect x="490" y="201" width="280" height="28" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="630" y="220" text-anchor="middle" font-size="10" fill="#333">sync_google_docs.py (pull Google Docs)</text>

  <rect x="490" y="239" width="280" height="28" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="630" y="258" text-anchor="middle" font-size="10" fill="#333">export_sessions.py (agent audit trail)</text>

  <!-- ===== Arrow: Repo -> Lead Agent ===== -->
  <line x1="280" y1="305" x2="280" y2="348" stroke="#6482b9" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="290" y="333" font-size="11" fill="#446299">reads all docs first</text>

  <!-- Arrow: Scripts -> Lead Agent (routes right then down) -->
  <path d="M 630 293 L 630 330 Q 630 350 580 350 L 500 350" stroke="#82b366" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>
  <text x="640" y="322" font-size="11" fill="#446299">feeds live context</text>

  <!-- ===== ROW 2: Lead Agent ===== -->
  <rect x="210" y="350" width="290" height="55" rx="10" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="355" y="373" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Lead Agent</text>
  <text x="355" y="392" text-anchor="middle" font-size="11" fill="#555">(Claude Code / other coding agent)</text>

  <!-- ===== Arrow: Lead -> Steps ===== -->
  <line x1="355" y1="405" x2="355" y2="438" stroke="#6482b9" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- ===== ROW 3: Workflow Steps ===== -->
  <rect x="20" y="445" width="175" height="50" rx="8" fill="#fff2cc" stroke="#d6b656"/>
  <text x="107" y="466" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">1. Reads docs</text>
  <text x="107" y="481" text-anchor="middle" font-size="9" fill="#555">CLAUDE.md, DISCOVERIES.md</text>

  <rect x="215" y="445" width="175" height="50" rx="8" fill="#fff2cc" stroke="#d6b656"/>
  <text x="302" y="466" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">2. Surveys problem space</text>
  <text x="302" y="481" text-anchor="middle" font-size="9" fill="#555">27 approaches</text>

  <rect x="415" y="445" width="185" height="50" rx="8" fill="#fff2cc" stroke="#d6b656"/>
  <text x="507" y="466" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">3. Dispatches sub-agents</text>
  <text x="507" y="481" text-anchor="middle" font-size="9" fill="#555">blind, parallel</text>

  <rect x="625" y="445" width="190" height="50" rx="8" fill="#fff2cc" stroke="#d6b656"/>
  <text x="720" y="466" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">4. Collects results</text>
  <text x="720" y="481" text-anchor="middle" font-size="9" fill="#555">updates DISCOVERIES.md</text>

  <!-- Step arrows (horizontal) -->
  <line x1="195" y1="470" x2="213" y2="470" stroke="#6482b9" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="390" y1="470" x2="413" y2="470" stroke="#6482b9" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="600" y1="470" x2="623" y2="470" stroke="#6482b9" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- ===== Arrow: Step 3 -> Sub-agents ===== -->
  <line x1="460" y1="495" x2="175" y2="555" stroke="#6482b9" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="507" y1="495" x2="330" y2="555" stroke="#6482b9" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="550" y1="495" x2="475" y2="555" stroke="#6482b9" stroke-width="1.2" marker-end="url(#ab)"/>

  <!-- ===== ROW 4: Sub-agents ===== -->
  <rect x="105" y="560" width="130" height="42" rx="6" fill="#f8cecc" stroke="#b85450"/>
  <text x="170" y="578" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Sub-agent 1</text>
  <text x="170" y="593" text-anchor="middle" font-size="10" fill="#555">GF(2)</text>

  <rect x="265" y="560" width="130" height="42" rx="6" fill="#f8cecc" stroke="#b85450"/>
  <text x="330" y="578" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Sub-agent 2</text>
  <text x="330" y="593" text-anchor="middle" font-size="10" fill="#555">Hebbian</text>

  <rect x="420" y="560" width="130" height="42" rx="6" fill="#f8cecc" stroke="#b85450"/>
  <text x="485" y="578" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Sub-agent 3</text>
  <text x="485" y="593" text-anchor="middle" font-size="10" fill="#555">RL Bandit</text>

  <text x="590" y="585" font-size="13" fill="#333" font-weight="bold">... x17</text>

  <!-- Isolation note -->
  <text x="330" y="628" text-anchor="middle" font-size="10" fill="#999">Each agent is isolated: no access to other agents' results or knowledge base.</text>
  <text x="330" y="642" text-anchor="middle" font-size="10" fill="#999">Read-only benchmark code prevents gaming the metrics.</text>

  <!-- ===== Arrows: Sub-agents -> Outputs ===== -->
  <line x1="170" y1="602" x2="260" y2="660" stroke="#6482b9" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="330" y1="602" x2="330" y2="660" stroke="#6482b9" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="485" y1="602" x2="400" y2="660" stroke="#6482b9" stroke-width="1.2" marker-end="url(#ab)"/>

  <!-- ===== ROW 5: Outputs ===== -->
  <rect x="190" y="665" width="280" height="35" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="330" y="688" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Outputs (per agent)</text>

  <rect x="100" y="720" width="130" height="28" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="165" y="739" text-anchor="middle" font-size="10" fill="#333">experiment.py</text>

  <rect x="265" y="720" width="130" height="28" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="330" y="739" text-anchor="middle" font-size="10" fill="#333">results.json</text>

  <rect x="430" y="720" width="130" height="28" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="495" y="739" text-anchor="middle" font-size="10" fill="#333">findings.md</text>

  <!-- ===== Feedback loop ===== -->
  <path d="M 330 748 L 330 785 Q 330 800 315 800 L 28 800 Q 13 800 13 785 L 13 170 Q 13 155 28 155 L 45 155" stroke="#e65100" stroke-width="1.8" fill="none" stroke-dasharray="6,3" marker-end="url(#ao)"/>
  <rect x="45" y="787" width="250" height="22" rx="4" fill="white" fill-opacity="0.9"/>
  <text x="170" y="802" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">feeds back into DISCOVERIES.md</text>
</svg>
